<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חפש את המטמון</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; color: #333; }
        h1 { color: #2c3e50; }
        .container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-top: 20px; box-sizing: border-box; }
        .riddle-box { background: #eef2f5; border-right: 5px solid #3498db; padding: 15px; font-size: 1.2em; margin: 20px 0; border-radius: 5px; min-height: 80px; }
        button { background-color: #3498db; color: white; border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        input[type="text"] { width: 90%; padding: 15px; font-size: 1.1em; border: 2px solid #bdc3c7; border-radius: 10px; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        #reader { width: 100%; margin-top: 20px; border-radius: 10px; overflow: hidden; display: none; }
        .progress { font-size: 0.9em; color: #7f8c8d; margin-bottom: 10px; }
        .reset-btn { background-color: #e74c3c; margin-top: 30px; font-size: 0.9em; padding: 10px; width: auto; }
        #gameScreen { display: none; }
        .finish-text { color: #27ae60; font-weight: bold; font-size: 1.3em; margin: 15px 0;}
        
        /* עיצוב טבלת המובילים */
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 8px; overflow: hidden; font-size: 0.95em; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .leaderboard-table th { background-color: #2ecc71; color: white; font-weight: bold; }
        .leaderboard-table tr:nth-child(even) { background-color: #f9f9f9; }
        .leaderboard-table tr:last-child td { border-bottom: none; }
        #leaderboardContainer { margin-top: 15px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

    <h1>חפש את המטמון 🗺️</h1>
    
    <div class="container" id="welcomeScreen">
        <h2>ברוכים הבאים!</h2>
        <p>הכניסו את השם שלכם כדי להתחיל:</p>
        <input type="text" id="playerNameInput" placeholder="הכנס שם...">
        <button onclick="startGame()">התחל משחק וספור זמן!</button>
    </div>

    <div class="container" id="gameScreen">
        <div class="progress" id="progressText">תחנה 1 מתוך 8</div>
        <div class="riddle-box" id="riddleText">טוען את החידה...</div>
        <button id="scanBtn" onclick="startScanner()">סרוק את הברקוד שמצאת</button>
        <div id="reader"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">איפוס המשחק (למנהל)</button>

    <script>
        // הדבק כאן את הקישור שלך מהגוגל שיטס:
        const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbxdk_FZ2zYmzZ_TyXQmFPOXUQlF6sBO4aJ6BDgY-uA-ulgC6qGKDbeL_ZLxRJ-QJD7TjQ/exec";

        const stations = [
            { level: 1, code: "station_1", text: "ברוכים הבאים למשחק! החידה הראשונה: הברקוד לחידה הבאה נמצא במקום שבוא מקבלים את המפתחות לחדרים" },
            { level: 2, code: "station_2", text: "כל הכבוד! החידה הבאה: יש לי שם של לוחם אבל אני נמצא בדרך כלל במטבח." },
            { level: 3, code: "station_3", text: "מעולה! הרמז השלישי הוא - אני כחול והגעתי מיפן." },
            { level: 4, code: "station_4", text: "חצי דרך! הרמז הרביעי - יש כאלה שחושבים שאני מסריח ודביק (חוץ מג'וקים)." },
            { level: 5, code: "station_5", text: "מצוין. הרמז החמישי - זהירות אני לוהט!!." },
            { level: 6, code: "station_6", text: "מתקרבים לסוף... הרמז השישי - אנשים נהנים להתקרר ממני ביום קיץ חם?" },
            { level: 7, code: "station_7", text: "כמעט שם! הברקוד השביעי מחכה לכם במקום שכל הילדים אוהבים לשחק." },
            { level: 8, code: "station_8", text: "התחנה האחרונה! הרמז לחידה האחרונה הוא - המספר 45!" },
            { level: 9, code: "finish", text: "🎉 כל הכבוד! סיימתם את המשחק ומצאתם את המטמון! 🎉" }
        ];

        let html5QrcodeScanner;
        let playerName = localStorage.getItem("treasureName");
        let isProcessing = false; // משתנה חסימה למניעת כפילויות סריקה קרובות

        window.onload = function() {
            if (playerName) {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('gameScreen').style.display = 'block';
                updateUI();
            }
        };

        function startGame() {
            const inputName = document.getElementById('playerNameInput').value.trim();
            if (inputName === "") {
                alert("אנא הכנס שם כדי להמשיך");
                return;
            }
            playerName = inputName;
            localStorage.setItem("treasureName", playerName);
            
            if (!localStorage.getItem("treasureStartTime")) {
                localStorage.setItem("treasureStartTime", Date.now());
            }

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            updateUI();
        }

        function getCurrentLevel() {
            return parseInt(localStorage.getItem("treasureLevel")) || 1;
        }

        function updateUI() {
            const currentLevel = getCurrentLevel();
            if (currentLevel > 8) {
                const netTimeFormatted = localStorage.getItem("treasureNetTime") || "";
                let timeDisplay = netTimeFormatted ? `<div class="finish-text">⏱️ זמן הריצה שלכם: ${netTimeFormatted}</div>` : "";
                
                document.getElementById('riddleText').innerHTML = stations[8].text + timeDisplay + `<h3>🏆 טבלת המובילים 🏆</h3><div id="leaderboardContainer">טוען טבלה...</div>`;
                document.getElementById('progressText').innerText = "המשחק הסתיים!";
                document.getElementById('scanBtn').style.display = 'none';
                
                if (GOOGLE_SHEETS_URL && GOOGLE_SHEETS_URL.startsWith("http")) {
                    fetch(GOOGLE_SHEETS_URL)
                    .then(res => res.json())
                    .then(data => displayLeaderboard(data))
                    .catch(() => { document.getElementById('leaderboardContainer').innerText = "שגיאה בטעינת הטבלה."; });
                }
                return;
            }
            document.getElementById('riddleText').innerText = stations[currentLevel - 1].text;
            document.getElementById('progressText').innerText = `תחנה ${currentLevel} מתוך 8`;
        }

        function displayLeaderboard(data) {
            if (!data || data.length === 0) {
                document.getElementById('leaderboardContainer').innerText = "אין עדיין תוצאות בטבלה.";
                return;
            }
            
            let html = '<table class="leaderboard-table"><thead><tr><th>שם השחקן</th><th>זמן ריצה נטו</th></tr></thead><tbody>';
            data.forEach(player => {
                html += `<tr><td>${escapeHtml(player.name)}</td><td>${escapeHtml(player.netTime)}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('leaderboardContainer').innerHTML = html;
        }

        function escapeHtml(text) {
            return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('scanBtn').style.display = 'none';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } });
            html5QrcodeScanner.render(onScanSuccess, () => {});
        }

        function onScanSuccess(decodedText) {
            // אם המערכת כבר באמצע עיבוד של סריקה, נתעלם מהפריים הנוכחי
            if (isProcessing) return;

            const currentLevel = getCurrentLevel();
            const expectedCode = "station_" + (currentLevel + 1); 

            if (currentLevel === 8 && decodedText === "station_9") {
                isProcessing = true; // נעל את הסורק מיד
                finishGame();
                return;
            }

            if (decodedText === expectedCode) {
                isProcessing = true; // נעל את הסורק מיד
                alert("קוד נכון! עוברים לתחנה הבאה...");
                localStorage.setItem("treasureLevel", currentLevel + 1);
                closeScannerAndUpdate();
            } else {
                alert("אופס! זה הברקוד הלא נכון. נסו שוב!");
            }
        }

        function finishGame() {
            localStorage.setItem("treasureLevel", 9);
            
            const startTime = localStorage.getItem("treasureStartTime");
            let netTimeFormatted = "לא ידוע";
            if (startTime) {
                const diffMs = Date.now() - parseInt(startTime);
                const minutes = Math.floor(diffMs / 60000);
                const seconds = Math.floor((diffMs % 60000) / 1000);
                netTimeFormatted = minutes + " דקות ו-" + seconds + " שניות";
            }
            localStorage.setItem("treasureNetTime", netTimeFormatted);
            
            if (GOOGLE_SHEETS_URL && GOOGLE_SHEETS_URL.startsWith("http")) {
                const finalUrl = GOOGLE_SHEETS_URL + "?name=" + encodeURIComponent(playerName) + "&netTime=" + encodeURIComponent(netTimeFormatted);
                
                fetch(finalUrl)
                .then(() => {
                    alert("כל הכבוד! מצאתם את המטמון האחרון!");
                    closeScannerAndUpdate();
                }).catch(() => {
                    alert("כל הכבוד! מצאתם את המטמון האחרון!");
                    closeScannerAndUpdate();
                });
            } else {
                alert("כל הכבוד! מצאתם את המטמון האחרון!");
                closeScannerAndUpdate();
            }
        }

        function closeScannerAndUpdate() {
            html5QrcodeScanner.clear().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('scanBtn').style.display = 'block';
                isProcessing = false; // שחרור הנעילה לתחנה הבאה או למשחק חדש
                updateUI();
            });
        }

        function resetGame() {
            if (confirm("לאפס את המשחק ולהתחיל מהתחלה? (זה ימחק גם את התוצאה הנוכחית בטלפון זה)")) {
                localStorage.removeItem("treasureLevel");
                localStorage.removeItem("treasureName");
                localStorage.removeItem("treasureStartTime");
                localStorage.removeItem("treasureNetTime");
                isProcessing = false;
                location.reload();
            }
        }
    </script>
</body>
</html>
